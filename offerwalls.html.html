<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RefHunter | GPT Sites</title>

<link rel="icon" type="image/png" href="logo4.png">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:ui-sans-serif,system-ui,Arial;
    color:#fff;

    background:
        radial-gradient(ellipse at top, rgba(120,255,120,0.06), transparent 60%),
        radial-gradient(ellipse at 50% 30%, rgba(0,255,100,0.05), transparent 70%),
        linear-gradient(180deg,#0b140b 0%,#0f1f0f 30%,#0a0a0a 100%);
}

/* HERO */
.hero-banner{
    position:relative;
    width:100%;
    height:6vh;
    min-height:60px;
    background:linear-gradient(180deg,#0b140b,#0f1f0f,#0a0a0a);
}

.hero-overlay{
    position:absolute;
    top:8px;
    left:20px;
    background:rgba(0,0,0,0.4);
    backdrop-filter:blur(4px);
    padding:6px 12px;
    border-radius:8px;
}

.hero-overlay h1{
    font-size:20px;
    font-weight:800;
    background:linear-gradient(90deg,#b6ff5c,#6aff00);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.hero-overlay p{
    font-size:10px;
}

/* CONTAINER */
.container{
    max-width:1750px;
    margin:auto;
    padding:30px 14px 40px;
}

/* SEARCHBAR */
.searchWrap{
    width:100%;
    display:flex;
    justify-content:center;
    margin-bottom:24px;
    padding:0 4px;
}

#searchInput{
    width:100%;
    max-width:500px;
    height:44px;

    border:none;
    outline:none;

    border-radius:14px;

    padding:0 16px;

    color:#fff;
    font-size:14px;

    background:
        linear-gradient(180deg,#071507,#041004);

    border:1px solid rgba(120,255,120,0.18);

    box-shadow:
        inset 0 0 12px rgba(0,255,100,0.03),
        0 0 12px rgba(0,0,0,0.22);

    transition:0.2s;
}

#searchInput:focus{
    border-color:rgba(120,255,120,0.45);

    box-shadow:
        0 0 18px rgba(0,255,100,0.12);
}

#searchInput::placeholder{
    color:#8ca08c;
}
    .newFilterBtn{
    margin-left:10px;

    width:80px;
    height:44px;

    border:none;
    outline:none;

    cursor:pointer;

    border-radius:14px;

    color:#b8ff8f;
    font-size:13px;
    font-weight:700;

    background:
        linear-gradient(180deg,#071507,#041004);

    border:1px solid rgba(120,255,120,0.18);

    box-shadow:
        inset 0 0 12px rgba(0,255,100,0.03),
        0 0 12px rgba(0,0,0,0.22);

    transition:.2s;
}

.newFilterBtn:hover{
    border-color:rgba(120,255,120,.45);
    box-shadow:0 0 18px rgba(0,255,100,.15);
}

.newFilterBtn.active{
    border-color:rgba(120,255,120,.8);

    box-shadow:
        0 0 18px rgba(0,255,100,.35),
        inset 0 0 10px rgba(0,255,100,.08);
}

/* GRID */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fill,250px);
    justify-content:center;
    gap:10px;
}

/* CARD */
.card{
    position:relative;
    height:150px;
    border-radius:18px;
    padding:14px;

    background:linear-gradient(180deg,#041104,#071707,#020702);
    border:1px solid rgba(0,255,80,0.18);

    display:flex;
    flex-direction:column;
    justify-content:space-between;

    overflow:visible;

    transition:0.2s;
}

.card:hover{
    transform:translateY(-4px);
    border-color:rgba(120,255,120,0.5);
    box-shadow:0 0 22px rgba(0,255,80,0.18);

    z-index:999;
}

/* BADGES WRAP */
.badges{
    position:absolute;
    top:10px;
    right:10px;

    display:flex;
    flex-wrap:wrap;

    justify-content:flex-end;
    align-items:center;

    gap:5px;

    max-width:calc(100% - 20px);

    z-index:20;
}

/* SINGLE BADGE */
.badge,
.badge-blue,
.badge-green,
.badge-red,
.badge-gold,
.badge-white{
    min-height:22px;

    padding:0 10px;

    border-radius:999px;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:10px;
    font-weight:700;

    letter-spacing:.2px;

    white-space:nowrap;

    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);

    border:1px solid transparent;

    box-shadow:
        inset 0 0 10px rgba(255,255,255,0.04),
        0 0 12px rgba(0,0,0,0.25);
}

/* DEFAULT GREEN */
.badge{
    color:#7dff8f;

    background:rgba(0,255,90,0.08);

    border-color:rgba(0,255,120,0.45);

    box-shadow:
        0 0 10px rgba(0,255,120,0.28),
        inset 0 0 8px rgba(0,255,120,0.08);
}

/* BLUE */
.badge-blue{
    color:#55cfff;

    background:rgba(0,110,255,0.08);

    border-color:rgba(0,180,255,0.45);

    box-shadow:
        0 0 10px rgba(0,180,255,0.28),
        inset 0 0 8px rgba(0,180,255,0.08);
}

/* GREEN */
.badge-green{
    color:#7dff8f;

    background:rgba(0,255,90,0.08);

    border-color:rgba(0,255,120,0.45);

    box-shadow:
        0 0 10px rgba(0,255,120,0.28),
        inset 0 0 8px rgba(0,255,120,0.08);
}

/* RED */
.badge-red{
    color:#ff5d9e;

    background:rgba(255,0,120,0.08);

    border-color:rgba(255,80,150,0.45);

    box-shadow:
        0 0 10px rgba(255,80,150,0.25),
        inset 0 0 8px rgba(255,80,150,0.08);
}

/* GOLD */
.badge-gold{
    color:#fff3b0;

    background:
        linear-gradient(
            180deg,
            rgba(255,220,90,0.22),
            rgba(255,180,0,0.10)
        );

    border:1px solid rgba(255,220,120,0.75);

    box-shadow:
        0 0 6px rgba(255,210,80,0.28),
        0 0 14px rgba(255,190,0,0.16),
        inset 0 0 8px rgba(255,240,160,0.08);

}
/* WHITE SHINE */
.badge-white{
    position:absolute;

    right:10px;

    bottom:48px;

    width:110px;
    height:24px;

    display:flex;
    align-items:center;
    justify-content:center;

    border-radius:999px;

    z-index:60;

    font-size:10px;
    font-weight:700;

    color:#ffffff;

    background:
        linear-gradient(
            180deg,
            rgba(255,255,255,0.20),
            rgba(220,220,220,0.08)
        );

    border:1px solid rgba(255,255,255,0.75);

       box-shadow:
        0 0 10px rgba(255,80,150,0.25),
        inset 0 0 8px rgba(255,80,150,0.08);
}

/* TOP */
.top{
    display:flex;
    align-items:center;
    gap:12px;
    width:100%;
}

/* LOGO */
.logo{
    width:42px;
    height:42px;
    object-fit:contain;
    border-radius:10px;
    display:block;
}

/* TEXT */
.text{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:flex-start;
    line-height:1.1;
}

.text h3{
    font-size:17px;
    font-weight:700;
}

.text p{
    font-size:13px;
    color:#9ad89a;
    margin-top:4px;
}

/* STARS */
.stars{
    position:absolute;
    top:36px;
    right:10px;

    font-size:14px;
    font-weight:700;

    color:#fff066;

    letter-spacing:2px;

    text-shadow:
        0 0 4px rgba(255,240,100,0.9),
        0 0 10px rgba(255,220,0,0.9),
        0 0 18px rgba(255,200,0,0.7);
}

/* BUTTON */
.btn{
    position:absolute;
    right:10px;
    bottom:10px;

    width:110px;
    height:30px;

    border-radius:8px;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:11px;
    font-weight:700;

    text-decoration:none;
    color:#b8ff8f;

    background:linear-gradient(180deg,#0f2d0f,#051205);

    border:1px solid rgba(120,255,120,0.4);

    transition:0.2s;
}

.btn:hover{
    border-color:rgba(120,255,120,0.8);
    box-shadow:0 0 14px rgba(0,255,100,0.18);
    }
/* OFFER TOGGLE */
.offer-toggle{
    position:absolute;
    left:10px;
    bottom:10px;

    width:110px;
    height:30px;

    border-radius:8px;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:11px;
    font-weight:700;

    cursor:pointer;

    color:#b8ff8f;

    background:linear-gradient(180deg,#0f2d0f,#051205);

    border:1px solid rgba(120,255,120,0.4);

    transition:0.2s;
    
}

.offer-toggle:hover{
    border-color:rgba(120,255,120,0.8);
    box-shadow:0 0 14px rgba(0,255,100,0.18);
    }

/* DROPDOWN */
.offerwalls{
    position:absolute;

    left:10px;
    right:10px;

    top:145px;

    padding:10px;

    border-radius:12px;

    background:rgba(5,15,5,0.96);

    border:1px solid rgba(120,255,120,0.18);

    display:none;

    z-index:9999;

    box-shadow:0 0 18px rgba(0,0,0,0.35);
}
    /* ONLY OPEN WHILE HOVERING */
.offer-toggle:hover + .offerwalls,
.offerwalls:hover{
    display:block;
}

.offerwalls ul{
    list-style:none;
}

.offerwalls li{
    font-size:12px;
    padding:5px 0;
    color:#b8ffb8;

    border-bottom:1px solid rgba(255,255,255,0.05);
}

.offerwalls li:last-child{
    border-bottom:none;
}

/* ACTIVE */
.card.active .offerwalls{
    display:block;
}

/* MOBILE */
@media (max-width:768px){

    .cards{
        grid-template-columns:repeat(2,1fr);
        gap:12px;
    }

    .card{
        height:220px;
    }

    .logo{
        width:56px;
        height:56px;
    }

    .badges{
        top:8px;
        right:8px;
        gap:6px;
        max-width:75%;
    }

    .badge,
    .badge-blue,
    .badge-green,
    .badge-red,
    .badge-gold,
    .badge-orange{
        font-size:9px;
        padding:4px 8px;
    }
}
.nav{
    display:flex;
    gap:12px;
    margin-top:8px;
}

.nav a{
    color:#b8ff8f;
    text-decoration:none;
    font-size:13px;
    font-weight:700;
    padding:6px 12px;
    border:1px solid rgba(120,255,120,0.3);
    border-radius:8px;
    background:linear-gradient(180deg,#0f2d0f,#051205);
    transition:.2s;
}

.nav a:hover{
    border-color:rgba(120,255,120,.8);
    box-shadow:0 0 12px rgba(0,255,100,.2);
}
</style>
</head>

    <script>
const searchInput = document.getElementById("searchInput");
const cardsContainer = document.querySelector(".cards");
let cards = Array.from(document.querySelectorAll(".card"));
const buttons = document.querySelectorAll(".filter-btn");

let activeFilter = "all";
        const newFilterBtn = document.getElementById("newFilterBtn");

/* ---------------- SORT ---------------- */
function getStars(card) {
    const starsText = card.querySelector(".stars")?.innerText || "";
    return (starsText.match(/★/g) || []).length;
}

function getTitle(card) {
    return card.querySelector("h3")?.innerText.toLowerCase() || "";
}

function isPinned(card) {
    return card.dataset.pinned === "true";
}

function sortCards() {
    cards.sort((a, b) => {

        if (isPinned(a) && !isPinned(b)) return -1;
        if (!isPinned(a) && isPinned(b)) return 1;

        const starDiff = getStars(b) - getStars(a);
        if (starDiff !== 0) return starDiff;

        return getTitle(a).localeCompare(getTitle(b));
    });

    cards.forEach(card => cardsContainer.appendChild(card));
}

sortCards();

/* ---------------- FILTER + SEARCH COMBINED ---------------- */
function updateView() {
    const searchValue = searchInput.value.toLowerCase();

    cards.forEach(card => {
        const text = card.innerText.toLowerCase();
const isNew =
    card.dataset.new === "true" ||
    card.innerText.toLowerCase().includes("new");
        const isPremium = card.innerText.toLowerCase().includes("premium");

        let matchesFilter = false;

        if (activeFilter === "all") matchesFilter = true;
        if (activeFilter === "new") matchesFilter = isNew;
        if (activeFilter === "premium") matchesFilter = isPremium;

        const matchesSearch = text.includes(searchValue);

        card.style.display = (matchesFilter && matchesSearch) ? "" : "none";
    });
}
newFilterBtn.addEventListener("click", () => {

    buttons.forEach(b => b.classList.remove("active"));

    activeFilter = "new";

    newFilterBtn.classList.toggle("active");

    if (!newFilterBtn.classList.contains("active")) {
        activeFilter = "all";
    }

    updateView();

});
/* SEARCH */
let timeout;
searchInput.addEventListener("keyup", function () {
    clearTimeout(timeout);
    timeout = setTimeout(updateView, 120);
});

/* FILTER BUTTONS */
buttons.forEach(btn => {
    btn.addEventListener("click", () => {

        buttons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");

        activeFilter = btn.innerText.toLowerCase();
        updateView();
    });
});

/* ---------------- LINKS FIX ---------------- */
document.querySelectorAll('.btn').forEach(link => {
    let href = link.getAttribute("href");

    // wenn leer → redirect zu deiner Seite
    if (!href || href.trim() === "") {
        link.setAttribute("href", "https://refhunter.site/");
    }

    link.setAttribute('target', '_blank');
    link.setAttribute('rel', 'noopener noreferrer');
});
</script>
